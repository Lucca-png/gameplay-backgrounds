name: Download Gameplay Videos

on:
  schedule:
    - cron: '0 3 * * *'  # Todo dia às 3h UTC
  workflow_dispatch:       # Permite rodar manualmente também

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install yt-dlp, ffmpeg and deno
        run: |
          sudo apt-get install -y ffmpeg unzip
          pip install yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Download gameplay videos
        run: |
          mkdir -p videos

          QUERIES=(
            "ytsearch5:minecraft parkour short vertical no copyright free use"
            "ytsearch5:subway surfers short clip no copyright"
            "ytsearch5:temple run short gameplay no copyright"
            "ytsearch5:geometry dash short no copyright"
            "ytsearch5:mobile game parkour short no copyright"
          )

          for QUERY in "${QUERIES[@]}"; do
            yt-dlp \
              --no-playlist \
              --max-downloads 2 \
              --match-filter "duration > 20 & duration < 600" \
              --format "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              --output "videos/%(id)s.%(ext)s" \
              --no-overwrites \
              --ignore-errors \
              --js-runtimes deno \
              "$QUERY" || true
          done

          echo "Videos downloaded:"
          ls -la videos/ || echo "No videos"

      - name: Limit to 20 videos max
        run: |
          if [ -d videos ]; then
            cd videos
            COUNT=$(ls -1 *.mp4 2>/dev/null | wc -l)
            echo "Total videos: $COUNT"
            if [ "$COUNT" -gt 20 ]; then
              ls -t *.mp4 | tail -n +21 | xargs rm -f
            fi
          fi

      - name: Generate video index JSON
        run: |
          mkdir -p videos
          echo "[" > index.json
          FIRST=true
          for f in videos/*.mp4; do
            [ -f "$f" ] || continue
            FILENAME=$(basename "$f")
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$FILENAME'))")
            URL="https://raw.githubusercontent.com/Lucca-png/gameplay-backgrounds/main/videos/${ENCODED}"
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> index.json
            fi
            echo "  {\"file\": \"$FILENAME\", \"url\": \"$URL\"}" >> index.json
          done
          echo "]" >> index.json
          cat index.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ index.json
          git diff --staged --quiet || git commit -m "chore: update gameplay videos $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Lucca-png/gameplay-backgrounds.git
